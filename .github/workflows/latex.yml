name: Build LaTeX to PDF

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6 使用 Node 24，可消除 checkout 的 Node 20 弃用提示
      - name: Checkout repository
        uses: actions/checkout@v6

      # xu-cheng/latex-action 对 root_file 含空格会拆成多个参数，导致找不到「TCF」
      # 先复制为无空格文件名再编译
      - name: Prepare TeX file (no spaces in path)
        run: cp "TCF Canada Cheatsheet.tex" cheatsheet.tex

      # 项目首行 % !TEX TS-program = lualatex，与 LuaLaTeX 一致
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cheatsheet.tex
          latexmk_use_lualatex: true
          latexmk_use_xelatex: false
          working_directory: .
          compiler: latexmk

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v6
        with:
          name: pdf
          path: cheatsheet.pdf
